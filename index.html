<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>House of Ren – Share Your Experience</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --cream:#f5f0e8;--warm-white:#faf7f2;--sage:#8a9e82;
    --dark-sage:#5a6e55;--terracotta:#c4826a;--deep:#2a2419;
    --gold:#c9a96e;--text:#3d3228;--muted:#9a8e82;
  }
  html{scroll-behavior:smooth}
  body{font-family:'Jost',sans-serif;background:var(--warm-white);color:var(--text);min-height:100vh;overflow-x:hidden}

  .hero{position:relative;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:60px 24px 80px;overflow:hidden;background:var(--deep)}
  .hero-bg{position:absolute;inset:0;background-image:url('https://landing-page-app-hero-images.s3.amazonaws.com/media/c85553f7-19f2-42f2-b189-dbd5ca746a83.jpeg');background-size:cover;background-position:center;opacity:.22;filter:saturate(.6)}
  .hero-overlay{position:absolute;inset:0;background:linear-gradient(180deg,rgba(42,36,25,.55) 0%,rgba(42,36,25,.72) 50%,rgba(42,36,25,.93) 100%)}
  .hero-content{position:relative;z-index:2;max-width:560px}
  .logo-wrap{margin-bottom:28px;animation:fadeDown .9s ease both}
  .logo-wrap img{width:90px;height:90px;object-fit:contain;border-radius:50%;background:rgba(245,240,232,.1);padding:10px;border:1px solid rgba(201,169,110,.35)}
  .tagline{font-size:.72rem;font-weight:200;letter-spacing:.35em;text-transform:uppercase;color:var(--gold);margin-bottom:14px;animation:fadeDown .9s .1s ease both}
  h1{font-family:'Cormorant Garamond',serif;font-weight:300;font-size:clamp(2.6rem,7vw,4.2rem);color:var(--cream);line-height:1.12;margin-bottom:20px;animation:fadeDown .9s .2s ease both}
  h1 em{font-style:italic;color:var(--gold)}
  .hero-sub{font-weight:300;font-size:.95rem;color:rgba(245,240,232,.65);letter-spacing:.05em;line-height:1.7;animation:fadeDown .9s .3s ease both}
  .scroll-hint{position:absolute;bottom:28px;left:50%;transform:translateX(-50%);z-index:2;display:flex;flex-direction:column;align-items:center;gap:8px;color:rgba(245,240,232,.4);font-size:.65rem;letter-spacing:.2em
